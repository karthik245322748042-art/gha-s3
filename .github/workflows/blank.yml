name: AI Powered Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        id: run_tests
        run: pytest test_app.py -v
        continue-on-error: true

      - name: Ask Gemini what went wrong
        if: steps.run_tests.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINIAPI }}
        run: |
          echo "Tests failed on branch ${{ github.ref_name }} by ${{ github.actor }}" | python ai_helper.py

      - name: Fail the job
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
