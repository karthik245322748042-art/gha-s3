<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Login Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#0f172a,#1e293b,#312e81);
      overflow:hidden;
      position:relative;
    }

    /* Animated Background Circles */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.5;
      animation: float 8s ease-in-out infinite;
    }

    body::before{
      background:#06b6d4;
      top:-100px;
      left:-100px;
    }

    body::after{
      background:#8b5cf6;
      bottom:-100px;
      right:-100px;
      animation-delay:4s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(30px);
      }
    }

    .login-container{
      position:relative;
      width:380px;
      padding:40px;
      border-radius:25px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 0 20px rgba(255,255,255,0.05);
      color:white;
      z-index:1;
    }

    .login-container h1{
      text-align:center;
      margin-bottom:10px;
      font-size:34px;
      font-weight:700;
      letter-spacing:1px;
    }

    .subtitle{
      text-align:center;
      color:#cbd5e1;
      margin-bottom:30px;
      font-size:14px;
    }

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#e2e8f0;
    }

    .input-group input{
      width:100%;
      padding:14px 16px;
      border:none;
      outline:none;
      border-radius:14px;
      background: rgba(255,255,255,0.12);
      color:white;
      font-size:15px;
      transition:0.3s;
      border:1px solid transparent;
    }

    .input-group input::placeholder{
      color:#cbd5e1;
    }

    .input-group input:focus{
      border:1px solid #38bdf8;
      background: rgba(255,255,255,0.18);
      box-shadow:0 0 12px rgba(56,189,248,0.5);
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
      font-size:13px;
    }

    .options a{
      color:#7dd3fc;
      text-decoration:none;
      transition:0.3s;
    }

    .options a:hover{
      color:white;
    }

    .login-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background: linear-gradient(135deg,#06b6d4,#8b5cf6);
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 4px 20px rgba(139,92,246,0.4);
    }

    .login-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 30px rgba(139,92,246,0.6);
    }

    .divider{
      text-align:center;
      margin:25px 0;
      color:#cbd5e1;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:"";
      position:absolute;
      top:50%;
      width:35%;
      height:1px;
      background:rgba(255,255,255,0.2);
    }

    .divider::before{
      left:0;
    }

    .divider::after{
      right:0;
    }

    .social-login{
      display:flex;
      gap:15px;
    }

    .social-btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:12px;
      background: rgba(255,255,255,0.1);
      color:white;
      cursor:pointer;
      transition:0.3s;
      font-weight:600;
    }

    .social-btn:hover{
      background: rgba(255,255,255,0.2);
      transform:translateY(-2px);
    }

    .signup{
      text-align:center;
      margin-top:25px;
      font-size:14px;
      color:#cbd5e1;
    }

    .signup a{
      color:#38bdf8;
      text-decoration:none;
      font-weight:600;
    }

    .signup a:hover{
      color:white;
    }

    @media(max-width:450px){
      .login-container{
        width:90%;
        padding:30px;
      }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to continue your journey</p>

    <form>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <div class="options">
        <label>
          <input type="checkbox">
          Remember me
        </label>

        <a href="#">Forgot Password?</a>
      </div>

      <button class="login-btn">Login</button>

      <div class="divider">OR</div>

      <div class="social-login">
        <button type="button" class="social-btn">Google</button>
        <button type="button" class="social-btn">GitHub</button>
      </div>

      <div class="signup">
        Don't have an account?
        <a href="#">Sign Up</a>
      </div>
    </form>
  </div>

</body>
</html>
